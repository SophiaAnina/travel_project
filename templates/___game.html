<div class="game-card" id="game-box-{{game.game_pk}}">
    <h2>{{game.game_title}}</h2>
    <p>{{game.game_platform}}</p>
    <p>{{game.game_comment or ''}}</p>

    <button mix-delete="/game/{{game.game_pk}}">
        Delete
    </button>

    <button type="button" mix-get="/games/{{game.game_pk}}">
        Edit
    </button>
</div>
