 <div class="update-form" id="game-box-{{game.game_pk}}"
>
 <form id="Update" mix-put="/games/{{game.game_pk}}" autocomplete="off">
    <div>
        <label for="title">Title</label>
        <input 
        placeholder="Title" 
        name="game_title" 
        type="text" 
        mix-validate="{{x.REGEX_GAME_TITLE}}"
        value="{{game.game_title}}"
        >
    </div>
    <div>
        <label for="platform">Platform</label>
        <select name="game_platform" value="{{game.game_platform}}"  mix-validate="{{x.REGEX_GAME_PLATFORM}}">
            <option value="">Platform</option>
            <option value="PS1">PS1</option>
            <option value="PS2">PS2</option>
            <option value="PS3">PS3</option>
            <option value="PS4">PS4</option>
            <option value="PSP">PSP</option>
            <option value="PS-Vita">PS-Vita</option>
            <option value="SNES">SNES</option>
            <option value="Nintendo64">Nintendo64</option>
            <option value="GameCube">GameCube</option>
            <option value="Wii">Wii</option>
            <option value="Wii U">Wii U</option>
            <option value="Nintendo Switch">Nintendo Switch</option>
            <option value="Gameboy">Gameboy</option>
            <option value="Gameboy Color">Gameboy Color</option>
            <option value="Gameboy Advanced">Gameboy Advanced</option>
            <option value="Nindtendo DS">Nintendo DS</option>
             <option value="Nindtendo 3DS">Nintendo 3DS</option>
            <option value="SEGA Mastersystem">SEGA Mastersystem</option>
            <option value="SEGA Megadrive">SEGA Megadrive</option>
            <option value="SEGA CD">SEGA CD</option>
            <option value="SEGA Dreamcast">SEGA Dreamcast</option>
            <option value="Diverse">Diverse</option>
        </select> 
    </div>
    <div>
        <label for="comment">game_comment</label>
        
        <input 
        placeholder="game_comment (optional)" 
        name="game_comment" 
        type="text" 
        mix-validate="{{x.REGEX_game_comment}}"
        value="{{game.game_comment or ''}}">
    </div>

     <input type="file" name="game_image" accept="image/*">

    <button type="submit">Save</button>
    <button  type="button" mix-get="/game-card/{{game.game_pk}}">Cancel</button>
   </form>
</div>
